services:
  mlo-data:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlo-data-api
    ports:
      - "8002:8002"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
